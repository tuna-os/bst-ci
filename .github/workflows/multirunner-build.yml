name: Multi-runner BuildStream build (reusable)

# Shared by tuna-os/tromso and tuna-os/xfce-linux (and any future BuildStream
# desktop-image repo). Splits a BuildStream build into parallel chunks across
# free GitHub runners, sharing CAS state between jobs via GHCR-hosted
# zstd tarballs. Owns planning + core + chunk builds; the caller is
# responsible for the final assembly/export/sign/push job (build_final),
# since that step's cosign OIDC identity should reflect the caller's own
# workflow, not this shared one.
#
# See https://github.com/tuna-os/bst-ci for usage notes.

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Short image name, used for cache tags and log artifact names (e.g. "tromso")'
        required: true
        type: string
      bst_target:
        description: 'BuildStream element to build (e.g. "oci/tromso.bst")'
        required: true
        type: string
      bst2_image:
        description: 'Pinned bst2 container image reference'
        required: false
        type: string
        default: 'registry.gitlab.com/freedesktop-sdk/infrastructure/freedesktop-sdk-docker-images/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d'
      num_chunks:
        description: 'Number of parallel dependency chunks'
        required: false
        type: string
        default: '10'
      core_split:
        description: 'Number of foundational elements to build serially before chunking the rest'
        required: false
        type: string
        default: '200'
    outputs:
      matrix_keys:
        description: 'JSON array of chunk names, for the caller to re-download/merge CAS in build_final'
        value: ${{ jobs.planning.outputs.matrix_keys }}
      cache_keys:
        description: 'JSON object mapping chunk name -> composite cache key'
        value: ${{ jobs.planning.outputs.cache_keys }}
      final_target:
        description: 'The BuildStream target to build in build_final'
        value: ${{ jobs.planning.outputs.final_target }}
      core_targets:
        description: 'Space-separated core element names (informational)'
        value: ${{ jobs.planning.outputs.core_targets }}

env:
  IMAGE_NAME: ${{ inputs.image_name }}
  BST_TARGET: ${{ inputs.bst_target }}
  BST2_IMAGE: ${{ inputs.bst2_image }}
  NUM_CHUNKS: ${{ inputs.num_chunks }}
  CORE_SPLIT: ${{ inputs.core_split }}

jobs:
  # ── Phase 1: Plan ────────────────────────────────────────────────────
  planning:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    outputs:
      matrix_keys: ${{ steps.matrix.outputs.matrix_keys }}
      matrix_data: ${{ steps.matrix.outputs.matrix_data }}
      cache_keys: ${{ steps.matrix.outputs.cache_keys }}
      core_targets: ${{ steps.matrix.outputs.core_targets }}
      final_target: ${{ steps.matrix.outputs.final_target }}
    steps:
      - uses: actions/checkout@v7

      # This job's own scripts/ci-build-matrix.py, checked out alongside
      # (not merged into) the caller's tree — the caller shouldn't need to
      # carry a copy of this script just to use this reusable workflow.
      - name: Checkout bst-ci scripts
        uses: actions/checkout@v7
        with:
          repository: tuna-os/bst-ci
          ref: main
          path: .bst-ci

      - run: podman pull "$BST2_IMAGE"

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Cache BuildStream sources
        uses: actions/cache@v6
        with:
          path: .cache/buildstream/sources
          key: bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-${{ hashFiles('elements/**/*.bst') }}
          restore-keys: |
            bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-

      - name: Generate Build Matrix
        id: matrix
        env:
          BST_FLAGS: --no-interactive
        run: |
          mkdir -p .cache/buildstream logs

          podman run --rm --privileged --device /dev/fuse \
            --security-opt apparmor=unconfined --cap-add SYS_ADMIN \
            -v "${{ github.workspace }}:/src:rw" \
            -v "${{ github.workspace }}/.cache/buildstream:/root/.cache/buildstream:rw" \
            -w /src \
            "$BST2_IMAGE" \
            python3 /src/.bst-ci/scripts/ci-build-matrix.py "$BST_TARGET" \
              "$NUM_CHUNKS" "$CORE_SPLIT" > matrix.json

          cat matrix.json

          python3 -c "
          import json
          data = json.load(open('matrix.json'))
          keys = list(data['matrix'].keys())
          print(f'matrix_keys={json.dumps(keys)}')
          print(f'matrix_data={json.dumps(data[\"matrix\"])}')
          print(f'cache_keys={json.dumps(data.get(\"cache_keys\", {}))}')
          print(f'core_targets={data.get(\"core\", \"\")}')
          print(f'final_target={data[\"final\"]}')
          " >> "$GITHUB_OUTPUT"

  # ── Phase 2: Core (bootstrap) elements ──────────────────────────────
  build_core:
    needs: planning
    if: needs.planning.outputs.core_targets != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
    env:
      TARGETS: ${{ needs.planning.outputs.core_targets }}
    steps:
      - name: Free disk space
        uses: ublue-os/remove-unwanted-software@v9
        continue-on-error: true

      - uses: actions/checkout@v7
      - run: podman pull "$BST2_IMAGE"

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Cache BuildStream sources
        uses: actions/cache@v6
        with:
          path: .cache/buildstream/sources
          key: bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-${{ hashFiles('elements/**/*.bst') }}
          restore-keys: |
            bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-

      - name: Login to GHCR
        run: echo "$GITHUB_TOKEN" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Core Cache from GHCR
        run: |
          mkdir -p ~/.cache/buildstream
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          CORE_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-core:latest"
          if oras pull "$CORE_REF" -o .; then
            if [ -f cas-core.tar.zst ]; then
              zstd -d -c -T0 cas-core.tar.zst | tar -xf - -C "$HOME/.cache/buildstream"
              rm -f cas-core.tar.zst
            fi
          else
            echo "No existing ${IMAGE_NAME} core cache, starting fresh."
          fi

      - name: Build Core
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: |
          mkdir -p logs
          # Bounded well inside the job timeout so the CAS push below always
          # runs — a job-level timeout cancels the job and throws away the
          # entire build.
          timeout 270m just bst --log-file /src/logs/build-core.log build $TARGETS

      - name: Archive and Push Core CAS
        if: always()
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          CORE_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-core:latest"
          podman run --rm \
            -v "$HOME/.cache/buildstream:/input:ro" \
            -v "${{ github.workspace }}:/output:rw" \
            "$BST2_IMAGE" \
            sh -c "tar -cf - -C /input --exclude 'cas/staging' --exclude 'cas/tmp' . | zstd -T0 > /output/cas-core.tar.zst"
          oras push "$CORE_REF" cas-core.tar.zst:application/vnd.buildstream.cas.tar.zst

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: build-logs-${{ env.IMAGE_NAME }}-core
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

  # ── Phase 3: Dependency chunks (parallel) ───────────────────────────
  build_deps:
    needs: [planning, build_core]
    if: always() && !contains(needs.*.result, 'failure') && needs.planning.outputs.matrix_keys != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.planning.outputs.matrix_keys) }}
    env:
      TARGETS: ${{ fromJson(needs.planning.outputs.matrix_data)[matrix.chunk] }}
      CHUNK_CACHE_KEY: ${{ fromJson(needs.planning.outputs.cache_keys)[matrix.chunk] }}
    name: Build ${{ matrix.chunk }}
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - uses: actions/checkout@v7
      - run: podman pull "$BST2_IMAGE"

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Cache BuildStream sources
        uses: actions/cache@v6
        with:
          path: .cache/buildstream/sources
          key: bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-${{ hashFiles('elements/**/*.bst') }}
          restore-keys: |
            bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-

      - name: Login to GHCR
        run: echo "$GITHUB_TOKEN" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check GHCR for cached chunk
        id: cache_check
        if: env.CHUNK_CACHE_KEY != '' && env.CHUNK_CACHE_KEY != 'null'
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          CHUNK_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${{ matrix.chunk }}:${CHUNK_CACHE_KEY}"
          if oras manifest fetch "$CHUNK_REF" > /dev/null 2>&1; then
            echo "cache_hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache_hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Core Cache
        if: steps.cache_check.outputs.cache_hit != 'true'
        run: |
          mkdir -p ~/.cache/buildstream
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if oras pull "ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-core:latest" -o .; then
            if [ -f cas-core.tar.zst ]; then
              zstd -d -c -T0 cas-core.tar.zst | tar -xf - -C "$HOME/.cache/buildstream"
              rm -f cas-core.tar.zst
            fi
          fi

      - name: Restore Chunk Cache (fallback to latest)
        if: steps.cache_check.outputs.cache_hit != 'true'
        continue-on-error: true
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          LATEST_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${{ matrix.chunk }}:latest"
          if oras pull "$LATEST_REF" -o .; then
            if [ -f cas-${{ matrix.chunk }}.tar.zst ]; then
              mkdir -p ~/.cache/buildstream
              zstd -d -c -T0 cas-${{ matrix.chunk }}.tar.zst | tar -xf - -C "$HOME/.cache/buildstream"
              rm -f cas-${{ matrix.chunk }}.tar.zst
            fi
          fi

      - name: Build Chunk
        id: build
        if: steps.cache_check.outputs.cache_hit != 'true'
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: |
          [ -z "$TARGETS" ] && { echo "skipped=true" >> "$GITHUB_OUTPUT"; exit 0; }
          mkdir -p ~/.cache/buildstream logs
          # Bounded well inside the job timeout so the salvage push below
          # always runs (a job-level timeout cancels the job and loses ~6h of
          # work; this burned hundreds of runner-hours before 2026-07-19).
          # No retry wrapper: buildstream-ci.conf already sets retry-failed
          # and network-retries, and the old loop returned 0 on total failure,
          # which would have published a bogus exact-key cache tag.

          # Some chunks have crashed the runner agent itself via disk
          # exhaustion, with nothing in the build log to show it coming.
          # Log free space periodically so a repeat shows whether it's a
          # slow leak or a sudden spike, and roughly where in the build.
          ( while true; do echo "::notice::disk free: $(df -h --output=avail / | tail -1)"; sleep 300; done ) &
          watcher_pid=$!

          rc=0
          timeout 270m just bst --log-file /src/logs/build-${{ matrix.chunk }}.log build $TARGETS || rc=$?
          kill "$watcher_pid" 2>/dev/null || true
          [ "$rc" -eq 124 ] && echo "::warning::chunk hit the 270m build budget — partial CAS will be salvaged"
          exit $rc

      - name: Push Chunk CAS to GHCR
        if: always() && steps.cache_check.outputs.cache_hit != 'true' && steps.build.outputs.skipped != 'true' && env.CHUNK_CACHE_KEY != '' && env.CHUNK_CACHE_KEY != 'null'
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          LATEST_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${{ matrix.chunk }}:latest"
          CHUNK_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${{ matrix.chunk }}:${CHUNK_CACHE_KEY}"
          podman run --rm \
            -v "$HOME/.cache/buildstream:/input:ro" \
            -v "${{ github.workspace }}:/output:rw" \
            "$BST2_IMAGE" \
            sh -c "tar -cf - -C /input --exclude 'cas/staging' --exclude 'cas/tmp' . | zstd -T0 > /output/cas-${{ matrix.chunk }}.tar.zst"
          oras push "$LATEST_REF" cas-${{ matrix.chunk }}.tar.zst:application/vnd.buildstream.cas.tar.zst
          [ "${{ steps.build.outcome }}" == "success" ] && \
            oras push "$CHUNK_REF" cas-${{ matrix.chunk }}.tar.zst:application/vnd.buildstream.cas.tar.zst || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: build-logs-${{ env.IMAGE_NAME }}-${{ matrix.chunk }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore
